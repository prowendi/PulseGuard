{{ define "login-page" }}{{ template "layout-open" . }}
<div class="bg-white rounded-lg shadow-md border border-slate-200 p-8">
  <h1 class="text-2xl font-semibold text-slate-900 mb-1">登录</h1>
  <p class="text-sm text-slate-500 mb-6">PulseGuard 多租户告警推送平台</p>
  <form method="POST" action="/ui/login" class="space-y-4">
    <input type="hidden" name="csrf" value="{{ .CSRF }}">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">邮箱</label>
      <input type="email" name="email" autofocus required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
      <input type="password" name="password" required class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div class="flex items-center justify-between pt-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 py-2 rounded-md transition-colors">登录</button>
      <a href="/ui/register" class="text-sm text-slate-500 hover:text-slate-700">还没账号？注册</a>
    </div>
  </form>
</div>
{{ template "layout-close" . }}{{ end }}
